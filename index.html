<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meher's Dino Fly 🦕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a0a2e;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #gameContainer {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  canvas {
    display: block;
    max-width: 100%; max-height: 100%;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
</div>

<script>
// ============================================================
//  MEHER'S DINO FLY — A gift from her father ❤️
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Responsive sizing ---
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const W = () => window.innerWidth;
const H = () => window.innerHeight;

// --- Game State ---
let state = 'menu'; // menu, playing, dead
let score = 0;
let highScore = parseInt(localStorage.getItem('meherDinoHigh') || '0');
let frameCount = 0;
let shakeTimer = 0;
let flashTimer = 0;

// --- Dino ---
const dino = {
  x: 0, y: 0, vy: 0, rotation: 0,
  width: 52, height: 48,
  flapPower: -6.8,
  gravity: 0.28,
  maxFall: 7.5,
  wingFrame: 0,
  wingTimer: 0,
  trail: [],
  reset() {
    this.x = W() * 0.22;
    this.y = H() * 0.45;
    this.vy = 0;
    this.rotation = 0;
    this.trail = [];
  },
  flap() {
    this.vy = this.flapPower;
    this.wingFrame = 1;
    this.wingTimer = 8;
    // Sparkle burst
    for (let i = 0; i < 6; i++) {
      particles.push(createSparkle(this.x, this.y + 10));
    }
  },
  update() {
    this.vy += this.gravity;
    if (this.vy > this.maxFall) this.vy = this.maxFall;
    this.y += this.vy;

    // Rotation based on velocity
    const targetRot = this.vy < 0 ? -0.4 : Math.min(this.vy * 0.08, 1.2);
    this.rotation += (targetRot - this.rotation) * 0.12;

    // Wing animation
    if (this.wingTimer > 0) {
      this.wingTimer--;
      if (this.wingTimer === 0) this.wingFrame = 0;
    }

    // Trail
    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
    if (this.trail.length > 12) this.trail.shift();
    this.trail.forEach(t => t.alpha *= 0.85);
  },
  draw() {
    // Draw trail
    this.trail.forEach((t, i) => {
      ctx.globalAlpha = t.alpha * 0.3;
      ctx.fillStyle = '#7cf5a0';
      const s = 6 + i * 0.5;
      ctx.beginPath();
      ctx.arc(t.x - 15, t.y + 5, s / 2, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    const s = 1; // scale

    // --- BODY ---
    // Main body (rounded green)
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.ellipse(0, 0, 24 * s, 20 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly
    ctx.fillStyle = '#a7f3d0';
    ctx.beginPath();
    ctx.ellipse(4 * s, 5 * s, 14 * s, 12 * s, 0.15, 0, Math.PI * 2);
    ctx.fill();

    // --- TAIL ---
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.moveTo(-22 * s, -2 * s);
    ctx.quadraticCurveTo(-38 * s, -14 * s, -32 * s, -6 * s);
    ctx.quadraticCurveTo(-42 * s, -2 * s, -26 * s, 4 * s);
    ctx.closePath();
    ctx.fill();

    // Tail spikes
    ctx.fillStyle = '#f59e0b';
    const spikes = [[-24, -8], [-30, -12], [-36, -10]];
    spikes.forEach(([sx, sy]) => {
      ctx.beginPath();
      ctx.moveTo(sx * s, sy * s);
      ctx.lineTo((sx + 3) * s, (sy - 8) * s);
      ctx.lineTo((sx + 6) * s, sy * s);
      ctx.closePath();
      ctx.fill();
    });

    // --- HEAD ---
    ctx.fillStyle = '#4ade80';
    ctx.beginPath();
    ctx.ellipse(20 * s, -8 * s, 14 * s, 12 * s, -0.1, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    ctx.fillStyle = '#34d399';
    ctx.beginPath();
    ctx.ellipse(32 * s, -4 * s, 9 * s, 7 * s, 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Nostril
    ctx.fillStyle = '#166534';
    ctx.beginPath();
    ctx.ellipse(37 * s, -6 * s, 2 * s, 1.5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye white
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(24 * s, -13 * s, 7 * s, 7.5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupil - looks forward
    ctx.fillStyle = '#1e1b4b';
    ctx.beginPath();
    ctx.ellipse(27 * s, -13 * s, 4 * s, 5 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eye shine
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(29 * s, -15 * s, 2 * s, 0, Math.PI * 2);
    ctx.fill();

    // Cute blush
    ctx.fillStyle = 'rgba(251, 146, 160, 0.5)';
    ctx.beginPath();
    ctx.ellipse(28 * s, -3 * s, 5 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mouth (smile)
    ctx.strokeStyle = '#166534';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.arc(32 * s, -2 * s, 5 * s, 0.2, Math.PI * 0.8);
    ctx.stroke();

    // --- ARMS / WINGS ---
    const wingAngle = this.wingFrame === 1 ? -0.6 : 0.2;
    ctx.save();
    ctx.translate(2 * s, -8 * s);
    ctx.rotate(wingAngle);
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.ellipse(0, -14 * s, 8 * s, 16 * s, 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#86efac';
    ctx.beginPath();
    ctx.ellipse(1 * s, -10 * s, 5 * s, 10 * s, 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // --- LEGS ---
    ctx.fillStyle = '#f59e0b';
    // Left leg
    ctx.beginPath();
    ctx.roundRect(-6 * s, 15 * s, 8 * s, 10 * s, 3);
    ctx.fill();
    // Right leg
    ctx.beginPath();
    ctx.roundRect(8 * s, 15 * s, 8 * s, 10 * s, 3);
    ctx.fill();

    // Tiny toes
    ctx.fillStyle = '#d97706';
    [[-5, 24], [-1, 25], [3, 24]].forEach(([tx, ty]) => {
      ctx.beginPath();
      ctx.arc(tx * s, ty * s, 2 * s, 0, Math.PI * 2);
      ctx.fill();
    });
    [[9, 24], [13, 25], [17, 24]].forEach(([tx, ty]) => {
      ctx.beginPath();
      ctx.arc(tx * s, ty * s, 2 * s, 0, Math.PI * 2);
      ctx.fill();
    });

    // --- Back spikes ---
    ctx.fillStyle = '#f59e0b';
    const backSpikes = [[-8, -18], [0, -20], [8, -19], [15, -17]];
    backSpikes.forEach(([bx, by]) => {
      ctx.beginPath();
      ctx.moveTo((bx - 3) * s, by * s);
      ctx.lineTo(bx * s, (by - 9) * s);
      ctx.lineTo((bx + 3) * s, by * s);
      ctx.closePath();
      ctx.fill();
    });

    ctx.restore();
  }
};

// --- Pipes / Crystals ---
let pipes = [];
const pipeWidth = 72;
const pipeGap = () => Math.max(190, 230 - score * 0.8);
const pipeSpeed = () => Math.min(2.8 + score * 0.04, 5);

function spawnPipe() {
  const gap = pipeGap();
  const minY = 100;
  const maxY = H() - 140 - gap;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({
    x: W() + 50,
    gapTop: gapY,
    gapBottom: gapY + gap,
    scored: false,
    color: ['#a78bfa', '#f472b6', '#38bdf8', '#fb923c', '#34d399'][Math.floor(Math.random() * 5)]
  });
}

function drawPipe(p) {
  const w = pipeWidth;
  const r = 12;

  // Top pipe
  const grad1 = ctx.createLinearGradient(p.x, 0, p.x + w, 0);
  grad1.addColorStop(0, p.color);
  grad1.addColorStop(0.5, shadeColor(p.color, 30));
  grad1.addColorStop(1, shadeColor(p.color, -20));

  ctx.fillStyle = grad1;
  ctx.beginPath();
  ctx.roundRect(p.x, -10, w, p.gapTop + 10, [0, 0, r, r]);
  ctx.fill();

  // Top pipe cap
  ctx.fillStyle = shadeColor(p.color, -15);
  ctx.beginPath();
  ctx.roundRect(p.x - 6, p.gapTop - 28, w + 12, 30, r);
  ctx.fill();

  // Crystal glow on cap
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(p.x + 4, p.gapTop - 24, 10, 22, 5);
  ctx.fill();

  // Bottom pipe
  const grad2 = ctx.createLinearGradient(p.x, 0, p.x + w, 0);
  grad2.addColorStop(0, p.color);
  grad2.addColorStop(0.5, shadeColor(p.color, 30));
  grad2.addColorStop(1, shadeColor(p.color, -20));

  ctx.fillStyle = grad2;
  ctx.beginPath();
  ctx.roundRect(p.x, p.gapBottom, w, H() - p.gapBottom + 10, [r, r, 0, 0]);
  ctx.fill();

  // Bottom pipe cap
  ctx.fillStyle = shadeColor(p.color, -15);
  ctx.beginPath();
  ctx.roundRect(p.x - 6, p.gapBottom, w + 12, 30, r);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.roundRect(p.x + 4, p.gapBottom + 4, 10, 22, 5);
  ctx.fill();

  // Floating gems in the gap
  const gemY = (p.gapTop + p.gapBottom) / 2;
  const bob = Math.sin(frameCount * 0.06 + p.x * 0.01) * 5;
  ctx.fillStyle = '#fbbf24';
  ctx.globalAlpha = 0.8;
  drawStar(p.x + w / 2, gemY + bob, 8, 5, 0.5);
  ctx.globalAlpha = 1;
}

// --- Particles ---
let particles = [];

function createSparkle(x, y) {
  return {
    x, y,
    vx: (Math.random() - 0.5) * 5,
    vy: (Math.random() - 0.7) * 4,
    size: 2 + Math.random() * 4,
    life: 1,
    decay: 0.03 + Math.random() * 0.03,
    color: ['#fbbf24', '#f472b6', '#a78bfa', '#38bdf8', '#4ade80'][Math.floor(Math.random() * 5)],
    type: 'sparkle'
  };
}

function createScorePopup(x, y) {
  return {
    x, y, vy: -2.5, life: 1, decay: 0.025, type: 'score'
  };
}

// --- Background ---
let bgStars = [];
for (let i = 0; i < 80; i++) {
  bgStars.push({
    x: Math.random() * 2000,
    y: Math.random() * 1400,
    size: 0.5 + Math.random() * 2.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.8
  });
}

let clouds = [];
for (let i = 0; i < 6; i++) {
  clouds.push({
    x: Math.random() * 2000,
    y: 30 + Math.random() * (400),
    w: 80 + Math.random() * 120,
    speed: 0.15 + Math.random() * 0.35,
    alpha: 0.04 + Math.random() * 0.06
  });
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H());
  grad.addColorStop(0, '#0f0326');
  grad.addColorStop(0.4, '#1a0a4a');
  grad.addColorStop(0.7, '#2d1b69');
  grad.addColorStop(1, '#1a3a5c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), H());

  // Stars
  bgStars.forEach(s => {
    const twinkle = 0.4 + Math.sin(frameCount * 0.03 + s.twinkle) * 0.6;
    ctx.globalAlpha = twinkle * 0.7;
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    ctx.arc(s.x % W(), s.y % H(), s.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Clouds
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x + c.w < -50) c.x = W() + 50;
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#c4b5fd';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w, c.w * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Ground
  const groundH = 80;
  const gy = H() - groundH;
  const gGrad = ctx.createLinearGradient(0, gy, 0, H());
  gGrad.addColorStop(0, '#065f46');
  gGrad.addColorStop(0.3, '#064e3b');
  gGrad.addColorStop(1, '#022c22');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, gy, W(), groundH);

  // Grass line
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = 0; x < W(); x += 8) {
    const h = Math.sin(x * 0.05 + frameCount * 0.02) * 4;
    ctx.moveTo(x, gy);
    ctx.lineTo(x + 3, gy - 6 - h);
  }
  ctx.stroke();

  // Ground pattern
  ctx.fillStyle = 'rgba(16, 185, 129, 0.15)';
  for (let x = -((frameCount * 2) % 20); x < W(); x += 20) {
    ctx.fillRect(x, gy + 15, 10, 3);
    ctx.fillRect(x + 7, gy + 35, 10, 3);
    ctx.fillRect(x + 3, gy + 55, 10, 3);
  }
}

// --- UI Drawing ---
function drawScore() {
  ctx.textAlign = 'center';

  // Score shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.font = '800 54px "Baloo 2", cursive';
  ctx.fillText(score, W() / 2 + 2, 72);

  // Score
  ctx.fillStyle = '#fbbf24';
  ctx.fillText(score, W() / 2, 70);

  // Score outline
  ctx.strokeStyle = '#92400e';
  ctx.lineWidth = 2;
  ctx.strokeText(score, W() / 2, 70);
}

function drawMenu() {
  // Title glow
  const pulse = 0.85 + Math.sin(frameCount * 0.04) * 0.15;

  ctx.textAlign = 'center';

  // Title shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = '800 46px "Baloo 2", cursive';
  ctx.fillText("Meher's Dino Fly", W() / 2 + 3, H() * 0.22 + 3);

  // Title
  ctx.fillStyle = `rgba(251, 191, 36, ${pulse})`;
  ctx.font = '800 46px "Baloo 2", cursive';
  ctx.fillText("Meher's Dino Fly", W() / 2, H() * 0.22);

  // Subtitle
  ctx.fillStyle = '#c4b5fd';
  ctx.font = '600 20px "Fredoka", sans-serif';
  ctx.fillText('A gift from your father ❤️', W() / 2, H() * 0.22 + 40);

  // Dino idle animation on menu
  const idleY = H() * 0.48 + Math.sin(frameCount * 0.04) * 12;
  dino.x = W() / 2 - 10;
  dino.y = idleY;
  dino.rotation = Math.sin(frameCount * 0.03) * 0.1;
  dino.wingFrame = Math.sin(frameCount * 0.1) > 0.3 ? 1 : 0;
  dino.draw();

  // Tap prompt
  const tapPulse = 0.5 + Math.sin(frameCount * 0.07) * 0.5;
  ctx.globalAlpha = tapPulse;
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '700 26px "Fredoka", sans-serif';
  ctx.fillText('Tap to Play!', W() / 2, H() * 0.72);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#a78bfa';
    ctx.font = '600 18px "Fredoka", sans-serif';
    ctx.fillText(`Best: ${highScore} 🏆`, W() / 2, H() * 0.80);
  }

  // Footer
  ctx.fillStyle = 'rgba(196, 181, 253, 0.4)';
  ctx.font = '400 14px "Fredoka", sans-serif';
  ctx.fillText('🦕 Made with love for Meher 🦕', W() / 2, H() - 30);
}

function drawDeadScreen() {
  // Overlay
  ctx.fillStyle = 'rgba(15, 3, 38, 0.65)';
  ctx.fillRect(0, 0, W(), H());

  ctx.textAlign = 'center';
  const bounce = Math.abs(Math.sin(frameCount * 0.05)) * 8;

  // Game Over
  ctx.fillStyle = '#f87171';
  ctx.font = '800 50px "Baloo 2", cursive';
  ctx.fillText('Oh No!', W() / 2, H() * 0.28 - bounce);

  // Score card background
  const cardW = 260, cardH = 200;
  const cardX = W() / 2 - cardW / 2;
  const cardY = H() * 0.33;
  ctx.fillStyle = 'rgba(30, 27, 75, 0.9)';
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 20);
  ctx.fill();
  ctx.strokeStyle = '#a78bfa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cardX, cardY, cardW, cardH, 20);
  ctx.stroke();

  // Score label
  ctx.fillStyle = '#c4b5fd';
  ctx.font = '600 18px "Fredoka", sans-serif';
  ctx.fillText('Score', W() / 2, cardY + 40);

  ctx.fillStyle = '#fbbf24';
  ctx.font = '800 48px "Baloo 2", cursive';
  ctx.fillText(score, W() / 2, cardY + 95);

  ctx.fillStyle = '#c4b5fd';
  ctx.font = '600 18px "Fredoka", sans-serif';
  ctx.fillText('Best', W() / 2, cardY + 130);

  ctx.fillStyle = '#34d399';
  ctx.font = '800 36px "Baloo 2", cursive';
  ctx.fillText(highScore, W() / 2, cardY + 172);

  // New best
  if (score === highScore && score > 0) {
    ctx.fillStyle = '#fbbf24';
    ctx.font = '700 20px "Fredoka", sans-serif';
    ctx.fillText('⭐ New Best! ⭐', W() / 2, cardY + cardH + 35);
  }

  // Tap to retry
  const tapPulse = 0.4 + Math.sin(frameCount * 0.07) * 0.6;
  ctx.globalAlpha = tapPulse;
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '700 22px "Fredoka", sans-serif';
  ctx.fillText('Tap to Try Again', W() / 2, H() * 0.82);
  ctx.globalAlpha = 1;
}

// --- Helpers ---
function shadeColor(hex, amt) {
  let r = parseInt(hex.slice(1, 3), 16) + amt;
  let g = parseInt(hex.slice(3, 5), 16) + amt;
  let b = parseInt(hex.slice(5, 7), 16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

function drawStar(cx, cy, outerR, points, innerRatio) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : outerR * innerRatio;
    const a = (Math.PI * i) / points - Math.PI / 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

// --- Collision ---
function checkCollision() {
  const cr = 12; // Dino collision radius (forgiving)
  const groundY = H() - 80;

  // Ground / ceiling
  if (dino.y + cr > groundY || dino.y - cr < 0) return true;

  // Pipes
  for (const p of pipes) {
    // Top pipe body
    if (circleRect(dino.x, dino.y, cr, p.x, -10, pipeWidth, p.gapTop + 10)) return true;
    // Top pipe cap
    if (circleRect(dino.x, dino.y, cr, p.x - 6, p.gapTop - 28, pipeWidth + 12, 30)) return true;
    // Bottom pipe body
    if (circleRect(dino.x, dino.y, cr, p.x, p.gapBottom, pipeWidth, H() - p.gapBottom + 10)) return true;
    // Bottom pipe cap
    if (circleRect(dino.x, dino.y, cr, p.x - 6, p.gapBottom, pipeWidth + 12, 30)) return true;
  }
  return false;
}

// --- Sound effects using Web Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'flap') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(420, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(620, audioCtx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
  } else if (type === 'score') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.07);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.14);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
  } else if (type === 'die') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
  }
}

// --- Input ---
function handleTap() {
  if (state === 'menu') {
    state = 'playing';
    score = 0;
    pipes = [];
    particles = [];
    dino.reset();
    dino.flap();
    playSound('flap');
    spawnPipe();
  } else if (state === 'playing') {
    dino.flap();
    playSound('flap');
  } else if (state === 'dead') {
    if (frameCount - deathFrame > 30) {
      state = 'menu';
    }
  }
}

let deathFrame = 0;

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTap(); }, { passive: false });
canvas.addEventListener('mousedown', handleTap);
document.addEventListener('keydown', e => { if (e.code === 'Space') handleTap(); });

// --- Main Loop ---
let lastPipeSpawn = 0;

function gameLoop() {
  frameCount++;
  resize(); // Ensure canvas stays correct size

  // Camera shake
  let shakeX = 0, shakeY = 0;
  if (shakeTimer > 0) {
    shakeX = (Math.random() - 0.5) * shakeTimer * 2;
    shakeY = (Math.random() - 0.5) * shakeTimer * 2;
    shakeTimer -= 0.5;
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBackground();

  if (state === 'playing') {
    dino.update();

    // Spawn pipes
    const spawnInterval = Math.max(110, 155 - score * 1.2);
    if (frameCount - lastPipeSpawn > spawnInterval) {
      spawnPipe();
      lastPipeSpawn = frameCount;
    }

    // Update pipes
    const speed = pipeSpeed();
    pipes.forEach(p => {
      p.x -= speed;
      // Score
      if (!p.scored && p.x + pipeWidth < dino.x) {
        p.scored = true;
        score++;
        playSound('score');
        particles.push(createScorePopup(dino.x, dino.y - 30));
        for (let i = 0; i < 8; i++) particles.push(createSparkle(dino.x + 20, dino.y));
      }
    });
    pipes = pipes.filter(p => p.x + pipeWidth + 20 > 0);

    // Collision
    if (checkCollision()) {
      state = 'dead';
      deathFrame = frameCount;
      playSound('die');
      shakeTimer = 12;
      flashTimer = 8;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('meherDinoHigh', highScore.toString());
      }
      // Death particles
      for (let i = 0; i < 20; i++) particles.push(createSparkle(dino.x, dino.y));
    }

    // Draw pipes
    pipes.forEach(drawPipe);

    // Draw dino
    dino.draw();

    // Draw score
    drawScore();

  } else if (state === 'menu') {
    drawMenu();
  } else if (state === 'dead') {
    // Still draw game frozen
    pipes.forEach(drawPipe);
    dino.draw();
    drawScore();
    drawDeadScreen();
  }

  // Particles
  particles.forEach(p => {
    if (p.type === 'sparkle') {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.life -= p.decay;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      drawStar(p.x, p.y, p.size, 4, 0.4);
    } else if (p.type === 'score') {
      p.y += p.vy;
      p.life -= p.decay;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = '#fbbf24';
      ctx.font = '800 32px "Baloo 2", cursive';
      ctx.textAlign = 'center';
      ctx.fillText('+1', p.x, p.y);
    }
  });
  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);

  // Flash on death
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashTimer * 0.08})`;
    ctx.fillRect(0, 0, W(), H());
    flashTimer--;
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// Preload fonts then start
document.fonts.ready.then(() => {
  dino.reset();
  gameLoop();
});
</script>
