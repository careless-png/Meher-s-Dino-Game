<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meher's Dino Fly">
<title>Meher's Dino Fly 🦕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  MEHER'S DINO FLY v2 — A gift from her father
//  Baby T-Rex | Fire Breath | World Themes | Coins
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);
const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ==================== STATE ====================
let state = 'menu', score = 0, coins = 0, frameCount = 0;
let highScore = parseInt(localStorage.getItem('mdh2') || '0');
let highCoins = parseInt(localStorage.getItem('mdc2') || '0');
let shakeTimer = 0, flashTimer = 0, deathFrame = 0;

// ==================== WORLDS ====================
const worlds = [
  { name:'Prehistoric Jungle', emoji:'🌿',
    skyTop:'#071a07', skyMid:'#143d1f', skyBot:'#1d6b3a',
    groundTop:'#3d2b1f', groundBot:'#1a100b',
    grass:'#4ade80', cloud:'rgba(100,200,120,0.06)',
    pipes:['#8B4513','#A0522D','#6B8E23','#556B2F'],
    star:'#90EE90', env:'leaf' },
  { name:'Volcanic World', emoji:'🌋',
    skyTop:'#1a0000', skyMid:'#3d0a0a', skyBot:'#6b1a1a',
    groundTop:'#2d2d2d', groundBot:'#0d0d0d',
    grass:'#ff6b35', cloud:'rgba(255,80,30,0.05)',
    pipes:['#8B0000','#B22222','#DC143C','#FF4500'],
    star:'#ff9966', env:'lava' },
  { name:'Ice Age', emoji:'❄️',
    skyTop:'#0a1628', skyMid:'#1a3a5c', skyBot:'#4a8ab5',
    groundTop:'#d4e6f1', groundBot:'#85c1e9',
    grass:'#a8d8ea', cloud:'rgba(200,230,255,0.08)',
    pipes:['#5DADE2','#3498DB','#2E86C1','#85C1E9'],
    star:'#d4e6f1', env:'snow' },
  { name:'Outer Space', emoji:'🚀',
    skyTop:'#000011', skyMid:'#0a0a2e', skyBot:'#1a1a4e',
    groundTop:'#2d1b69', groundBot:'#0f0326',
    grass:'#c084fc', cloud:'rgba(192,132,252,0.04)',
    pipes:['#9b59b6','#8e44ad','#a855f7','#7c3aed'],
    star:'#e9d5ff', env:'stars' }
];
function getWorld() {
  if (score < 10) return worlds[0];
  if (score < 25) return worlds[1];
  if (score < 40) return worlds[2];
  return worlds[3];
}

// ==================== BG ELEMENTS ====================
let bgStars = [];
for (let i = 0; i < 90; i++) bgStars.push({
  x: Math.random()*2000, y: Math.random()*1400,
  size: 0.5+Math.random()*2.5, tw: Math.random()*Math.PI*2
});
let bgClouds = [];
for (let i = 0; i < 6; i++) bgClouds.push({
  x: Math.random()*2000, y: 30+Math.random()*350,
  w: 80+Math.random()*130, sp: 0.1+Math.random()*0.3
});
let envP = [];

// ==================== BABY T-REX ====================
const dino = {
  x:0, y:0, vy:0, rot:0,
  flapPow: -6.3, grav: 0.27, maxFall: 7,
  wingT: 0, trail: [], mouthT: 0,
  fireCharges: 3, maxFire: 3, fireRechT: 0, fireRechRate: 200,
  fireBreathT: 0, fireP: [],

  reset() {
    this.x = W()*0.22; this.y = H()*0.45;
    this.vy = 0; this.rot = 0; this.trail = [];
    this.fireCharges = 3; this.fireRechT = 0;
    this.fireBreathT = 0; this.fireP = []; this.mouthT = 0;
  },
  flap() {
    this.vy = this.flapPow; this.wingT = 10;
    for (let i=0;i<5;i++) particles.push(mkSparkle(this.x-10, this.y+15));
  },
  fire() {
    if (this.fireCharges <= 0) return false;
    this.fireCharges--; this.fireBreathT = 25; this.mouthT = 18;
    playSound('fire');
    for (let i=0;i<20;i++) this.fireP.push({
      x: this.x+40, y: this.y-8+(Math.random()-0.5)*18,
      vx: 6+Math.random()*9, vy: (Math.random()-0.5)*4,
      sz: 4+Math.random()*9, life: 1, dec: 0.028+Math.random()*0.03
    });
    return true;
  },
  update() {
    this.vy += this.grav;
    if (this.vy > this.maxFall) this.vy = this.maxFall;
    this.y += this.vy;
    const tr = this.vy < 0 ? -0.32 : Math.min(this.vy*0.065, 0.9);
    this.rot += (tr - this.rot)*0.1;
    if (this.wingT > 0) this.wingT--;
    if (this.mouthT > 0) this.mouthT--;
    if (this.fireBreathT > 0) this.fireBreathT--;
    if (this.fireCharges < this.maxFire) {
      this.fireRechT++;
      if (this.fireRechT >= this.fireRechRate) { this.fireCharges++; this.fireRechT = 0; }
    }
    this.trail.push({x:this.x, y:this.y, a:1});
    if (this.trail.length > 10) this.trail.shift();
    this.trail.forEach(t => t.a *= 0.82);
    this.fireP.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.sz*=0.97; p.life-=p.dec; });
    this.fireP = this.fireP.filter(p => p.life > 0);
  },
  drawFire() {
    this.fireP.forEach(p => {
      ctx.globalAlpha = p.life*0.85;
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz);
      g.addColorStop(0, `rgba(255,255,100,${p.life})`);
      g.addColorStop(0.4, `rgba(255,150,20,${p.life*0.8})`);
      g.addColorStop(1, 'rgba(255,50,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  },
  draw() {
    this.trail.forEach((t,i) => {
      ctx.globalAlpha = t.a*0.2; ctx.fillStyle = '#4ade80';
      ctx.beginPath(); ctx.arc(t.x-12,t.y+5,3+i*0.4,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    this.drawFire();

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    const s = 1.15;

    // TAIL
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.moveTo(-18*s, 5*s);
    ctx.quadraticCurveTo(-34*s, -2*s, -42*s, -10*s);
    ctx.quadraticCurveTo(-44*s, -14*s, -38*s, -6*s);
    ctx.quadraticCurveTo(-34*s, 4*s, -22*s, 10*s);
    ctx.closePath(); ctx.fill();

    // Tail spikes
    ctx.fillStyle = '#f59e0b';
    [[-26,-1],[-32,-5],[-38,-9]].forEach(([tx,ty]) => {
      ctx.beginPath();
      ctx.moveTo(tx*s,ty*s); ctx.lineTo((tx+2)*s,(ty-7)*s); ctx.lineTo((tx+5)*s,(ty+1)*s);
      ctx.closePath(); ctx.fill();
    });

    // BODY (round)
    ctx.fillStyle = '#4ade80';
    ctx.beginPath(); ctx.ellipse(0,4*s,20*s,20*s,0,0,Math.PI*2); ctx.fill();
    // Belly
    ctx.fillStyle = '#bbf7d0';
    ctx.beginPath(); ctx.ellipse(3*s,8*s,13*s,14*s,0.1,0,Math.PI*2); ctx.fill();

    // TINY ARMS
    ctx.fillStyle = '#22c55e';
    ctx.save(); ctx.translate(12*s,2*s); ctx.rotate(0.3+Math.sin(frameCount*0.15)*0.2);
    ctx.beginPath(); ctx.ellipse(0,0,3*s,7*s,0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#16a34a';
    ctx.beginPath(); ctx.arc(2.5*s,5.5*s,2.2*s,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // LEGS
    ctx.fillStyle = '#22c55e';
    ctx.beginPath(); ctx.ellipse(-7*s,20*s,6.5*s,9*s,0.1,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7*s,20*s,6.5*s,9*s,-0.1,0,Math.PI*2); ctx.fill();
    // Feet
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath(); ctx.ellipse(-9*s,27*s,7.5*s,3.5*s,0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9*s,27*s,7.5*s,3.5*s,-0.15,0,Math.PI*2); ctx.fill();
    // Claws
    ctx.fillStyle = '#b45309';
    [[-14,27],[-10,28],[-6,28]].forEach(([a,b])=>{ctx.beginPath();ctx.arc(a*s,b*s,1.5*s,0,Math.PI*2);ctx.fill();});
    [[5,28],[9,28],[13,27]].forEach(([a,b])=>{ctx.beginPath();ctx.arc(a*s,b*s,1.5*s,0,Math.PI*2);ctx.fill();});

    // HEAD (BIG)
    ctx.fillStyle = '#4ade80';
    ctx.beginPath(); ctx.ellipse(6*s,-22*s,19*s,17*s,-0.05,0,Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.ellipse(24*s,-17*s,12*s,9*s,-0.1,0,Math.PI*2); ctx.fill();

    // Mouth
    if (this.mouthT > 0) {
      ctx.fillStyle = '#dc2626';
      ctx.beginPath(); ctx.ellipse(30*s,-12*s,8*s,5*s,0.05,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      for (let i=0;i<4;i++){
        const tx=(25+i*3)*s;
        ctx.beginPath();ctx.moveTo(tx,-10*s);ctx.lineTo(tx+1.2*s,-7*s);ctx.lineTo(tx+2.4*s,-10*s);ctx.closePath();ctx.fill();
      }
    } else {
      ctx.strokeStyle = '#166534'; ctx.lineWidth = 1.8;
      ctx.beginPath(); ctx.arc(28*s,-14*s,5.5*s,0.1,Math.PI*0.7); ctx.stroke();
    }

    // Nostrils
    ctx.fillStyle = '#166534';
    ctx.beginPath(); ctx.ellipse(34*s,-21*s,1.8*s,1.3*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(32*s,-22*s,1.5*s,1.1*s,0,0,Math.PI*2); ctx.fill();

    // EYES (BIG cute)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(8*s,-28*s,9*s,10*s,0.05,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1e1b4b';
    ctx.beginPath(); ctx.ellipse(11*s,-28*s,5*s,6.5*s,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(13*s,-31*s,2.5*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9*s,-26*s,1.2*s,0,Math.PI*2); ctx.fill();

    // Blush
    ctx.fillStyle = 'rgba(251,146,160,0.45)';
    ctx.beginPath(); ctx.ellipse(20*s,-16*s,5*s,2.8*s,0.1,0,Math.PI*2); ctx.fill();

    // Head spikes
    ctx.fillStyle = '#f59e0b';
    [[-6,-34],[0,-37],[6,-38],[12,-36],[18,-32]].forEach(([a,b])=>{
      ctx.beginPath();ctx.moveTo((a-3)*s,(b+4)*s);ctx.lineTo(a*s,b*s);ctx.lineTo((a+3)*s,(b+4)*s);ctx.closePath();ctx.fill();
    });

    // Back spikes
    [[-10,-10],[-4,-13],[2,-12]].forEach(([a,b])=>{
      ctx.beginPath();ctx.moveTo((a-2)*s,b*s);ctx.lineTo(a*s,(b-6)*s);ctx.lineTo((a+2)*s,b*s);ctx.closePath();ctx.fill();
    });

    ctx.restore();
  }
};

// ==================== PIPES ====================
let pipes = [], lastGapC = 0;
const PW = 70;
const pipeGap = () => Math.max(210, 260 - score*0.5);
const pipeSp = () => Math.min(2.5 + score*0.03, 4.5);

function spawnPipe() {
  const gap = pipeGap(), minY = 130, maxY = H()-170-gap;
  let gapY;
  if (lastGapC === 0) gapY = (H()-gap)/2 - 40;
  else {
    const lt = lastGapC - gap/2;
    const lo = Math.max(minY, lt-130), hi = Math.min(maxY, lt+130);
    gapY = lo + Math.random()*(hi-lo);
  }
  gapY = Math.max(minY, Math.min(maxY, gapY));
  lastGapC = gapY + gap/2;
  const w = getWorld();
  pipes.push({
    x: W()+50, gapTop: gapY, gapBottom: gapY+gap, scored: false,
    color: w.pipes[Math.floor(Math.random()*w.pipes.length)],
    hasCoin: Math.random()<0.6, coinGot: false,
    dead: false, deadA: 0
  });
}

function drawPipe(p) {
  if (p.dead) {
    p.deadA += 0.05;
    if (p.deadA < 1) {
      ctx.globalAlpha = 1-p.deadA;
      ctx.fillStyle = '#ff8c00';
      ctx.beginPath();ctx.roundRect(p.x-8,p.gapTop-30,PW+16,24,8);ctx.fill();
      ctx.beginPath();ctx.roundRect(p.x-8,p.gapBottom+6,PW+16,24,8);ctx.fill();
      ctx.globalAlpha = 1;
    }
    return;
  }
  const r = 10;
  const g1 = ctx.createLinearGradient(p.x,0,p.x+PW,0);
  g1.addColorStop(0,p.color); g1.addColorStop(0.4,shadeC(p.color,35)); g1.addColorStop(1,shadeC(p.color,-25));

  ctx.fillStyle = g1;
  ctx.beginPath();ctx.roundRect(p.x,-10,PW,p.gapTop+10,[0,0,r,r]);ctx.fill();
  ctx.fillStyle = shadeC(p.color,-15);
  ctx.beginPath();ctx.roundRect(p.x-5,p.gapTop-22,PW+10,24,r);ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();ctx.roundRect(p.x+5,p.gapTop-18,7,16,4);ctx.fill();

  ctx.fillStyle = g1;
  ctx.beginPath();ctx.roundRect(p.x,p.gapBottom,PW,H()-p.gapBottom+10,[r,r,0,0]);ctx.fill();
  ctx.fillStyle = shadeC(p.color,-15);
  ctx.beginPath();ctx.roundRect(p.x-5,p.gapBottom,PW+10,24,r);ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();ctx.roundRect(p.x+5,p.gapBottom+4,7,16,4);ctx.fill();

  // Coin
  if (p.hasCoin && !p.coinGot) {
    const cx = p.x+PW/2, cy = (p.gapTop+p.gapBottom)/2;
    const bob = Math.sin(frameCount*0.07+p.x*0.01)*5;
    const spin = Math.abs(Math.cos(frameCount*0.05+p.x*0.02));
    ctx.save(); ctx.translate(cx,cy+bob); ctx.scale(spin,1);
    ctx.globalAlpha = 0.3; ctx.fillStyle = '#fbbf24';
    ctx.beginPath();ctx.arc(0,0,15,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha = 1;
    const cg = ctx.createRadialGradient(-3,-3,2,0,0,11);
    cg.addColorStop(0,'#fef08a');cg.addColorStop(0.6,'#fbbf24');cg.addColorStop(1,'#d97706');
    ctx.fillStyle = cg;
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle = '#fff7c2'; drawStar(0,0,5,5,0.5);
    ctx.restore();
  }
}

// ==================== PARTICLES ====================
let particles = [];
function mkSparkle(x,y) {
  return { x,y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.7)*4,
    sz:2+Math.random()*4, life:1, dec:0.03+Math.random()*0.03,
    color:['#fbbf24','#f472b6','#38bdf8','#4ade80','#ff6b35'][Math.floor(Math.random()*5)], type:'sparkle' };
}

// ==================== DRAW BG ====================
function drawBG() {
  const w = getWorld();
  const g = ctx.createLinearGradient(0,0,0,H());
  g.addColorStop(0,w.skyTop);g.addColorStop(0.5,w.skyMid);g.addColorStop(0.85,w.skyBot);
  ctx.fillStyle = g; ctx.fillRect(0,0,W(),H());

  const sa = w.env==='stars'?0.8:0.3;
  bgStars.forEach(s=>{
    const tw = 0.3+Math.sin(frameCount*0.03+s.tw)*0.7;
    ctx.globalAlpha = tw*sa; ctx.fillStyle = w.star;
    ctx.beginPath();ctx.arc(s.x%W(),s.y%H(),w.env==='stars'?s.size*1.3:s.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha = 1;

  bgClouds.forEach(c=>{
    c.x -= c.sp; if(c.x+c.w<-50) c.x=W()+50;
    ctx.globalAlpha=0.06; ctx.fillStyle=w.cloud;
    ctx.beginPath();ctx.ellipse(c.x,c.y,c.w,c.w*0.35,0,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  if(state==='playing'||state==='dead'){
    if(w.env==='snow'&&frameCount%4===0) envP.push({x:Math.random()*W(),y:-5,vx:-0.5+Math.random(),vy:1+Math.random()*1.5,sz:1.5+Math.random()*3,life:1,t:'snow'});
    if(w.env==='lava'&&frameCount%8===0) envP.push({x:Math.random()*W(),y:H()-75,vx:(Math.random()-0.5)*2,vy:-(2+Math.random()*3),sz:2+Math.random()*4,life:1,t:'lava'});
    if(w.env==='leaf'&&frameCount%14===0) envP.push({x:W()+10,y:Math.random()*H()*0.7,vx:-(1+Math.random()*2),vy:0.3+Math.random(),sz:3+Math.random()*4,life:1,rot:Math.random()*6.28,t:'leaf'});
  }
  envP.forEach(e=>{
    e.x+=e.vx||0;e.y+=e.vy||0;
    if(e.t==='snow'){ctx.globalAlpha=0.5;ctx.fillStyle='#e0f0ff';ctx.beginPath();ctx.arc(e.x,e.y,e.sz,0,Math.PI*2);ctx.fill();if(e.y>H())e.life=0;}
    else if(e.t==='lava'){e.vy+=0.08;e.life-=0.015;ctx.globalAlpha=e.life*0.7;ctx.fillStyle=`rgb(255,${Math.floor(80+e.life*120)},0)`;ctx.beginPath();ctx.arc(e.x,e.y,e.sz,0,Math.PI*2);ctx.fill();}
    else if(e.t==='leaf'){e.rot+=0.03;ctx.globalAlpha=0.45;ctx.fillStyle='#22c55e';ctx.save();ctx.translate(e.x,e.y);ctx.rotate(e.rot);ctx.beginPath();ctx.ellipse(0,0,e.sz,e.sz*0.4,0,0,Math.PI*2);ctx.fill();ctx.restore();if(e.x<-20)e.life=0;}
  });
  ctx.globalAlpha=1;
  envP=envP.filter(e=>e.life>0);

  // Ground
  const gy=H()-75;
  const gg=ctx.createLinearGradient(0,gy,0,H());
  gg.addColorStop(0,w.groundTop);gg.addColorStop(1,w.groundBot);
  ctx.fillStyle=gg;ctx.fillRect(0,gy,W(),75);
  ctx.strokeStyle=w.grass;ctx.lineWidth=2.5;ctx.beginPath();
  for(let x=0;x<W();x+=7){const h=Math.sin(x*0.05+frameCount*0.02)*4;ctx.moveTo(x,gy);ctx.lineTo(x+3,gy-5-h);}
  ctx.stroke();
  if(w.env==='lava'){ctx.globalAlpha=0.15+Math.sin(frameCount*0.04)*0.08;ctx.fillStyle='#ff4500';ctx.fillRect(0,gy-3,W(),6);ctx.globalAlpha=1;}
}

// ==================== HUD ====================
function drawHUD() {
  const w = getWorld();
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.font='800 46px "Baloo 2",cursive';ctx.fillText(score,W()/2+2,60);
  ctx.fillStyle='#fbbf24';ctx.fillText(score,W()/2,58);
  ctx.strokeStyle='#92400e';ctx.lineWidth=1.5;ctx.strokeText(score,W()/2,58);

  ctx.textAlign='left';ctx.font='700 20px "Fredoka",sans-serif';
  ctx.fillStyle='#fbbf24';ctx.fillText('💰 '+coins,16,36);

  ctx.textAlign='right';
  let ft='';for(let i=0;i<dino.maxFire;i++)ft+=i<dino.fireCharges?'🔥':'⚫';
  ctx.font='18px sans-serif';ctx.fillText(ft,W()-16,36);

  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.font='600 13px "Fredoka",sans-serif';
  ctx.fillText(w.emoji+' '+w.name,W()/2,H()-82);
}

function drawMenu() {
  const p = 0.85+Math.sin(frameCount*0.04)*0.15;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.font='800 42px "Baloo 2",cursive';
  ctx.fillText("Meher's Dino Fly",W()/2+3,H()*0.17+3);
  ctx.fillStyle=`rgba(251,191,36,${p})`;ctx.fillText("Meher's Dino Fly",W()/2,H()*0.17);

  ctx.fillStyle='#a7f3d0';ctx.font='600 18px "Fredoka",sans-serif';
  ctx.fillText('A gift from your father ❤️',W()/2,H()*0.17+36);

  const iy=H()*0.42+Math.sin(frameCount*0.04)*14;
  dino.x=W()/2-10;dino.y=iy;dino.rot=Math.sin(frameCount*0.03)*0.08;
  dino.wingT=Math.sin(frameCount*0.1)>0.3?5:0;dino.mouthT=0;dino.draw();

  const tp=0.4+Math.sin(frameCount*0.07)*0.6;
  ctx.globalAlpha=tp;ctx.fillStyle='#e2e8f0';ctx.font='700 24px "Fredoka",sans-serif';
  ctx.fillText('Tap to Fly!',W()/2,H()*0.64);ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,200,100,0.65)';ctx.font='600 15px "Fredoka",sans-serif';
  ctx.fillText('Double-tap to breathe fire 🔥',W()/2,H()*0.69);

  if(highScore>0){ctx.fillStyle='#a78bfa';ctx.font='600 16px "Fredoka",sans-serif';
  ctx.fillText('Best: '+highScore+' 🏆  Coins: '+highCoins+' 💰',W()/2,H()*0.77);}

  ctx.fillStyle='rgba(167,243,208,0.3)';ctx.font='400 13px "Fredoka",sans-serif';
  ctx.fillText('🦕 Made with love for Meher 🦕',W()/2,H()-26);
}

function drawDead() {
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W(),H());
  ctx.textAlign='center';
  const b=Math.abs(Math.sin(frameCount*0.05))*6;
  ctx.fillStyle='#f87171';ctx.font='800 46px "Baloo 2",cursive';
  ctx.fillText('Oh No!',W()/2,H()*0.24-b);

  const cw=270,ch=220,cx=W()/2-cw/2,cy=H()*0.30;
  ctx.fillStyle='rgba(30,27,75,0.92)';ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,18);ctx.fill();
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,18);ctx.stroke();

  ctx.fillStyle='#c4b5fd';ctx.font='600 16px "Fredoka",sans-serif';ctx.fillText('Score',W()/2,cy+32);
  ctx.fillStyle='#fbbf24';ctx.font='800 42px "Baloo 2",cursive';ctx.fillText(score,W()/2,cy+78);
  ctx.fillStyle='#c4b5fd';ctx.font='600 16px "Fredoka",sans-serif';ctx.fillText('Coins: '+coins+' 💰',W()/2,cy+108);
  ctx.fillStyle='#c4b5fd';ctx.fillText('Best',W()/2,cy+142);
  ctx.fillStyle='#34d399';ctx.font='800 30px "Baloo 2",cursive';ctx.fillText(highScore,W()/2,cy+178);

  if(score===highScore&&score>0){ctx.fillStyle='#fbbf24';ctx.font='700 17px "Fredoka",sans-serif';ctx.fillText('⭐ New Best! ⭐',W()/2,cy+ch+28);}

  const tp=0.4+Math.sin(frameCount*0.07)*0.6;
  ctx.globalAlpha=tp;ctx.fillStyle='#e2e8f0';ctx.font='700 20px "Fredoka",sans-serif';
  ctx.fillText('Tap to Try Again',W()/2,H()*0.82);ctx.globalAlpha=1;
}

// ==================== HELPERS ====================
function shadeC(hex,a){
  let r=parseInt(hex.slice(1,3),16)+a,g=parseInt(hex.slice(3,5),16)+a,b=parseInt(hex.slice(5,7),16)+a;
  return`rgb(${Math.max(0,Math.min(255,r))},${Math.max(0,Math.min(255,g))},${Math.max(0,Math.min(255,b))})`;
}
function drawStar(cx,cy,or,pts,ir){
  ctx.beginPath();
  for(let i=0;i<pts*2;i++){const r=i%2===0?or:or*ir;const a=(Math.PI*i)/pts-Math.PI/2;
  i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
  ctx.closePath();ctx.fill();
}
function cRect(cx,cy,cr,rx,ry,rw,rh){
  const clx=Math.max(rx,Math.min(cx,rx+rw)),cly=Math.max(ry,Math.min(cy,ry+rh));
  const dx=cx-clx,dy=cy-cly;return(dx*dx+dy*dy)<(cr*cr);
}
function cCirc(x1,y1,r1,x2,y2,r2){const dx=x1-x2,dy=y1-y2;return(dx*dx+dy*dy)<((r1+r2)*(r1+r2));}

// ==================== COLLISION ====================
function checkHit(){
  const cr=13,gy=H()-75;
  if(dino.y+cr>gy||dino.y-cr<0)return true;
  for(const p of pipes){
    if(p.dead)continue;
    if(cRect(dino.x,dino.y,cr,p.x,-10,PW,p.gapTop+10))return true;
    if(cRect(dino.x,dino.y,cr,p.x-5,p.gapTop-22,PW+10,24))return true;
    if(cRect(dino.x,dino.y,cr,p.x,p.gapBottom,PW,H()-p.gapBottom+10))return true;
    if(cRect(dino.x,dino.y,cr,p.x-5,p.gapBottom,PW+10,24))return true;
  }
  return false;
}
function checkCoins(){
  pipes.forEach(p=>{
    if(p.hasCoin&&!p.coinGot&&!p.dead){
      const cx=p.x+PW/2,cy=(p.gapTop+p.gapBottom)/2;
      if(cCirc(dino.x,dino.y,20,cx,cy,11)){
        p.coinGot=true;coins++;playSound('coin');
        particles.push({x:cx,y:cy,vy:-3,life:1,dec:0.025,type:'coinpop'});
        for(let i=0;i<5;i++)particles.push(mkSparkle(cx,cy));
      }
    }
  });
}
function checkFireHit(){
  if(dino.fireBreathT<=0)return;
  const reach=dino.x+130;
  pipes.forEach(p=>{
    if(!p.dead&&p.x<reach&&p.x+PW>dino.x){
      p.dead=true;p.deadA=0;score++;playSound('score');
      particles.push({x:p.x+PW/2,y:(p.gapTop+p.gapBottom)/2,vy:-2.5,life:1,dec:0.022,type:'popup',text:'+1 🔥'});
      for(let i=0;i<15;i++)particles.push({
        x:p.x+PW/2,y:p.gapTop+Math.random()*(p.gapBottom-p.gapTop),
        vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,
        sz:3+Math.random()*6,life:1,dec:0.03,
        color:['#ff6b35','#fbbf24','#ff4500','#ff8c00'][Math.floor(Math.random()*4)],type:'sparkle'
      });
    }
  });
}

// ==================== SOUND ====================
const aC=new(window.AudioContext||window.webkitAudioContext)();
function playSound(t){
  if(aC.state==='suspended')aC.resume();
  const o=aC.createOscillator(),g=aC.createGain();
  o.connect(g);g.connect(aC.destination);
  if(t==='flap'){o.type='sine';o.frequency.setValueAtTime(420,aC.currentTime);o.frequency.exponentialRampToValueAtTime(620,aC.currentTime+0.08);g.gain.setValueAtTime(0.1,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.12);o.start();o.stop(aC.currentTime+0.12);}
  else if(t==='score'){o.type='sine';o.frequency.setValueAtTime(523,aC.currentTime);o.frequency.setValueAtTime(659,aC.currentTime+0.07);o.frequency.setValueAtTime(784,aC.currentTime+0.14);g.gain.setValueAtTime(0.12,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.25);o.start();o.stop(aC.currentTime+0.25);}
  else if(t==='die'){o.type='sawtooth';o.frequency.setValueAtTime(300,aC.currentTime);o.frequency.exponentialRampToValueAtTime(80,aC.currentTime+0.3);g.gain.setValueAtTime(0.12,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.35);o.start();o.stop(aC.currentTime+0.35);}
  else if(t==='fire'){o.type='sawtooth';o.frequency.setValueAtTime(150,aC.currentTime);o.frequency.exponentialRampToValueAtTime(800,aC.currentTime+0.1);o.frequency.exponentialRampToValueAtTime(100,aC.currentTime+0.3);g.gain.setValueAtTime(0.12,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.3);o.start();o.stop(aC.currentTime+0.3);}
  else if(t==='coin'){o.type='sine';o.frequency.setValueAtTime(880,aC.currentTime);o.frequency.setValueAtTime(1100,aC.currentTime+0.06);g.gain.setValueAtTime(0.1,aC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,aC.currentTime+0.15);o.start();o.stop(aC.currentTime+0.15);}
}

// ==================== INPUT ====================
let lastTap=0;
function handleTap(){
  const now=Date.now(),dt=now-lastTap;
  if(state==='menu'){
    state='playing';score=0;coins=0;pipes=[];particles=[];envP=[];lastGapC=0;
    dino.reset();dino.flap();playSound('flap');spawnPipe();
  } else if(state==='playing'){
    if(dt<300){dino.fire();}
    else{dino.flap();playSound('flap');}
  } else if(state==='dead'){
    if(frameCount-deathFrame>35)state='menu';
  }
  lastTap=now;
}
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});
canvas.addEventListener('mousedown',handleTap);
document.addEventListener('keydown',e=>{
  if(e.code==='Space')handleTap();
  if(e.code==='KeyF'&&state==='playing')dino.fire();
});

// ==================== MAIN LOOP ====================
let lastSpawn=0;
function loop(){
  frameCount++;resize();
  let sx=0,sy=0;
  if(shakeTimer>0){sx=(Math.random()-0.5)*shakeTimer*2;sy=(Math.random()-0.5)*shakeTimer*2;shakeTimer-=0.5;}
  ctx.save();ctx.translate(sx,sy);

  drawBG();

  if(state==='playing'){
    dino.update();
    const si=Math.max(130,170-score*0.8);
    if(frameCount-lastSpawn>si){spawnPipe();lastSpawn=frameCount;}
    const sp=pipeSp();
    pipes.forEach(p=>{
      p.x-=sp;
      if(!p.scored&&p.x+PW<dino.x){p.scored=true;if(!p.dead){score++;playSound('score');
      particles.push({x:dino.x,y:dino.y-35,vy:-2.5,life:1,dec:0.022,type:'popup',text:'+1'});
      for(let i=0;i<5;i++)particles.push(mkSparkle(dino.x+20,dino.y));}}
    });
    pipes=pipes.filter(p=>p.x+PW+20>0);
    checkCoins();checkFireHit();
    if(checkHit()){
      state='dead';deathFrame=frameCount;playSound('die');shakeTimer=14;flashTimer=8;
      if(score>highScore){highScore=score;localStorage.setItem('mdh2',highScore+'');}
      if(coins>highCoins){highCoins=coins;localStorage.setItem('mdc2',highCoins+'');}
      for(let i=0;i<20;i++)particles.push(mkSparkle(dino.x,dino.y));
    }
    pipes.forEach(drawPipe);dino.draw();drawHUD();
  } else if(state==='menu'){drawMenu();}
  else if(state==='dead'){pipes.forEach(drawPipe);dino.draw();drawHUD();drawDead();}

  particles.forEach(p=>{
    if(p.type==='sparkle'){p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=p.dec;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;drawStar(p.x,p.y,p.sz,4,0.4);}
    else if(p.type==='popup'){p.y+=p.vy;p.life-=p.dec;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle='#fbbf24';ctx.font='800 26px "Baloo 2",cursive';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y);}
    else if(p.type==='coinpop'){p.y+=p.vy;p.life-=p.dec;ctx.globalAlpha=Math.max(0,p.life);ctx.font='800 24px "Baloo 2",cursive';ctx.textAlign='center';ctx.fillText('💰',p.x,p.y);}
  });
  ctx.globalAlpha=1;
  particles=particles.filter(p=>p.life>0);

  if(flashTimer>0){ctx.fillStyle=`rgba(255,255,255,${flashTimer*0.07})`;ctx.fillRect(0,0,W(),H());flashTimer--;}
  ctx.restore();
  requestAnimationFrame(loop);
}

document.fonts.ready.then(()=>{dino.reset();loop();});
</script>
